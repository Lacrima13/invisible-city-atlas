<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>MOOD SCAPE｜情绪生成宇宙</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="bg"></canvas>

<div class="ui">

  <div class="brand">
    <h1>MOOD SCAPE</h1>
    <p>情绪生成宇宙模拟器</p>
  </div>

  <div class="card">

    <div class="section-title">选择情绪维度</div>

    <div class="moods">
      <button onclick="setMood('calm')">宁静</button>
      <button onclick="setMood('anxiety')">焦虑</button>
      <button onclick="setMood('tired')">疲惫</button>
      <button onclick="setMood('chaos')">混沌</button>
    </div>

    <div class="section-title">能量密度</div>
    <input id="energy" type="range" min="0" max="100" value="50">

    <button class="generate" onclick="generateWorld()">
      生成情绪宇宙
    </button>

    <div id="output"></div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
